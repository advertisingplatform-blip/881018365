<html lang="ro">
<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="Agregator de știri diverse pentru informare rapidă. Actualizare la 30 min.">

</head>

  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-93B8GHKWYS');

<body>
<header>
  <a href="/" class="brand">
    <img src="logo.png" alt="Logo site" class="logo">
    <div>
      <span class="brand-title">
        <span class="nowrap">Știri culese din surse alese</span>
      </span><br>
      <small id="keywords" style="font-size: 0.8em; color: gray; display: block; margin-top: 4px;">
        Cuvintele cheie ale orei: ...
      </small>
    </div>
  </a>
  <button id="theme-toggle" title="Comută tema">☀️</button>
</header>

  <main id="news-container"><a class="card" href="/cuvinte.html" rel="noopener noreferrer">
    <img src="3.jpg" alt="Top 3 cele mai întâlnite cuvinte în titlurile știrilor. Evoluția în ultimele 24 de ore.">
    <div class="card-content">
      <h2>Top 3 cele mai întâlnite cuvinte în titlurile știrilor. Vezi evoluția în ultimele 24 de ore.</h2>
      <div class="source">
        <img class="favicon" src="favicon.ico" alt=""> 88108355.xyz • acum câteva minute
      </div>
    </div>
  </a></main>
  <div id="loading">Se încarcă...</div>
  <script>
fetch('keywords.json')
  .then(response => response.json())
  .then(data => {
    if (!Array.isArray(data) || data.length === 0) return;

    const latest = data[data.length - 1];
    const words = latest.keywords.map(kw => kw.word).join(', ');
    const ora = new Date(latest.timestamp).toLocaleTimeString('ro-RO', {
      hour: '2-digit',
      minute: '2-digit'
    });

    document.getElementById('keywords').textContent = `${ora} ► ${words}`;
  })
  .catch(() => {
    document.getElementById('keywords').style.display = 'none';
  });
</script>

</body>
</html>
